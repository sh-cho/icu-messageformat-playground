name: Release

# Push a tag like v1.2.3 to build and publish images to GHCR.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write       # push to ghcr.io
  security-events: write # upload the Trivy SARIF
  id-token: write        # provenance attestation

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU enables the linux/arm64 leg of the multi-arch JVM image.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires a lowercase image path; github.repository may contain uppercase.
      - id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # --- JVM image: multi-arch (amd64 + arm64) ---------------------------------
      - id: meta-jvm
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-jvm.outputs.tags }}
          labels: ${{ steps.meta-jvm.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      # --- Native image: amd64 only ----------------------------------------------
      # GraalVM native-image under QEMU emulation is impractically slow / OOM-prone,
      # so arm64 is intentionally skipped. Tagged with a `-native` suffix.
      - id: meta-native
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          flavor: |
            suffix=-native,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.native
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-native.outputs.tags }}
          labels: ${{ steps.meta-native.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          sbom: true
          provenance: mode=max

      # --- Supply-chain scan of the published JVM image --------------------------
      - name: Trivy scan (JVM image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.img.outputs.name }}:${{ steps.meta-jvm.outputs.version }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'   # report findings; don't fail an already-published release
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
