name: Release

# Push a tag like v1.2.3 to build and publish images to GHCR.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write       # push to ghcr.io
  security-events: write # upload the Trivy SARIF
  id-token: write        # provenance attestation

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # QEMU enables the linux/arm64 leg of the multi-arch JVM image.
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires a lowercase image path; github.repository may contain uppercase.
      - id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # --- JVM image: build (amd64) -> scan -> push (multi-arch) -----------------
      - id: meta-jvm
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Build amd64 + load into the daemon so Trivy scans BEFORE publish. load can't carry
      # a multi-arch image; OS/jar CVEs are arch-independent so amd64 covers the arm64 push.
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          load: true
          tags: scan-target:jvm
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pre-publish gate: fail on fixable CRITICAL/HIGH so a vulnerable image is never pushed.
      - name: Trivy scan (JVM image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-target:jvm
          format: sarif
          output: trivy-jvm.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      # Trivy writes the SARIF before exiting non-zero — upload even on failure.
      - name: Upload Trivy results (JVM)
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-jvm.sarif
          category: jvm-image

      # Gate passed -> push multi-arch (amd64 cache-hit, only arm64 built fresh).
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-jvm.outputs.tags }}
          labels: ${{ steps.meta-jvm.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      # --- Native image: amd64 only; build -> scan -> push -----------------------
      # Native under QEMU is impractically slow / OOM-prone, so arm64 is skipped; `-native` suffix.
      - id: meta-native
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.img.outputs.name }}
          flavor: |
            suffix=-native,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Build + load for scanning; gha cache makes the push below reuse the nativeCompile layer.
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.native
          load: true
          tags: scan-target:native
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (native image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: scan-target:native
          format: sarif
          output: trivy-native.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Upload Trivy results (native)
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-native.sarif
          category: native-image

      # Gate passed -> push (amd64, cache hit from the build above).
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.native
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-native.outputs.tags }}
          labels: ${{ steps.meta-native.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
